<script>
/* ============================ STORAGE HELPERS (híbrido: Claude storage OU IndexedDB local) ============================ */
function hasClaudeStorage(){ return typeof window.storage !== 'undefined' && window.storage !== null; }

const DB_NAME = 'pontofacil-db';
const STORE_NAME = 'kv';
let _dbPromise = null;
function openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if(!window.indexedDB){ reject(new Error('IndexedDB indisponível')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => { e.target.result.createObjectStore(STORE_NAME); };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
  return _dbPromise;
}
async function idbGet(key, fallback){
  try{
    const db = await openDB();
    return await new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result !== undefined ? req.result : fallback);
      req.onerror = () => resolve(fallback);
    });
  }catch(e){ console.error('Erro ao ler dados (IndexedDB)', e); return fallback; }
}
async function idbSet(key, value){
  try{
    const db = await openDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(value, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }catch(e){ console.error('Erro ao salvar dados (IndexedDB)', e); return false; }
}

async function getData(key, fallback){
  if(hasClaudeStorage()){
    try{
      const res = await window.storage.get(key, true);
      return res ? JSON.parse(res.value) : fallback;
    }catch(e){ return fallback; }
  }
  return await idbGet(key, fallback);
}
async function setData(key, value){
  if(hasClaudeStorage()){
    try{ await window.storage.set(key, JSON.stringify(value), true); return true; }
    catch(e){ console.error('Erro ao salvar (Claude storage)', e); return false; }
  }
  const ok = await idbSet(key, value);
  if(!ok) alert('Não foi possível salvar. Verifique o espaço de armazenamento do navegador.');
  return ok;
}

/* ============================ STATE ============================ */
let CONFIG = { pin:'1234', casaNome:'Casa' };
let FUNCIONARIAS = []; // [{id, nome, ativa}]
let selectedId = null;
let pendingTipo = null;
let stream = null;
let pinBuffer = '';
let currentAdminTab = 'funcionarias';
let currentMonthFilter = null;

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function pad(n){ return n.toString().padStart(2,'0'); }
function todayStr(d=new Date()){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
function nowHMS(d=new Date()){ return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function formatDateBR(dateStr){ const [y,m,d]=dateStr.split('-'); return `${d}/${m}/${y}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DIAS = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

/* ============================ INIT ============================ */
async function init(){
  CONFIG = await getData('config', { pin:'1234', casaNome:'Casa' });
  FUNCIONARIAS = await getData('funcionarias', []);
  $('#house-name-display').textContent = CONFIG.casaNome || 'Casa';
  await renderTiles();
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(renderTiles, 15000);
  buildKeypad();
  resyncPending();
}
document.addEventListener('DOMContentLoaded', init);

function tickClock(){
  const now = new Date();
  $('#clock').textContent = nowHMS(now);
  $('#date-line').textContent = `${DIAS[now.getDay()]}, ${now.getDate()} de ${MESES[now.getMonth()]}`;
}

/* ============================ HOME / TILES ============================ */
async function getTodayRegistros(){
  const mk = monthKeyOf(todayStr());
  const list = await getData(`registros:${mk}`, []);
  return list.filter(r => r.data === todayStr());
}

async function renderTiles(){
  const todays = await getTodayRegistros();
  const wrap = $('#tiles');
  wrap.innerHTML = '';
  const ativos = FUNCIONARIAS.filter(f => f.ativa !== false);
  if(ativos.length === 0){
    wrap.innerHTML = '<div class="empty">Nenhuma funcionária cadastrada.<br>Acesse o painel administrativo (⚙) para adicionar.</div>';
    return;
  }
  ativos.forEach(f => {
    const mine = todays.filter(r => r.funcionariaId === f.id);
    let statusHtml, dotClass;
    if(mine.length === 0){ statusHtml = 'Sem registro hoje'; dotClass='grey'; }
    else {
      const last = mine[mine.length-1];
      if(last.tipo === 'entrada'){ statusHtml = `Entrada às ${last.hora.slice(0,5)}`; dotClass='amber'; }
      else { statusHtml = `Saída às ${last.hora.slice(0,5)}`; dotClass='green'; }
    }
    const div = document.createElement('div');
    div.className = 'tile' + (selectedId === f.id ? ' selected' : '');
    div.innerHTML = `<div class="tile-name">${f.nome}</div><div class="tile-status"><span class="dot ${dotClass}"></span>${statusHtml}</div>`;
    div.onclick = () => selectEmployee(f.id);
    wrap.appendChild(div);
  });
}

function selectEmployee(id){
  selectedId = id;
  renderTiles();
  const f = FUNCIONARIAS.find(x => x.id === id);
  $('#selected-hint').innerHTML = `Selecionada: <b>${f.nome}</b>`;
  $('#stamp-btn').disabled = false;
}

$('#stamp-btn').onclick = async () => {
  if(!selectedId) return;
  const todays = await getTodayRegistros();
  const mine = todays.filter(r => r.funcionariaId === selectedId);
  pendingTipo = (mine.length % 2 === 0) ? 'entrada' : 'saida';
  openCamera();
};

$('#gear-btn').onclick = () => { showScreen('screen-login'); pinBuffer=''; renderPinDots(); };

/* ============================ CAMERA ============================ */
async function openCamera(){
  showScreen('screen-camera');
  $('#camera-caption').textContent = 'Sorria! Registrando ' + (pendingTipo === 'entrada' ? 'entrada' : 'saída');
  $('#video').style.display = '';
  $('#shutter-btn').style.display = '';
  hideCameraError();

  if(!window.isSecureContext){
    showCameraError('A câmera só funciona em um endereço seguro (https://). Este arquivo foi aberto localmente. Hospede o app em um link https e abra por ele.');
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showCameraError('Este navegador não tem suporte à câmera nesta página.');
    return;
  }
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user' }, audio:false });
    $('#video').srcObject = stream;
  }catch(e){
    let msg = 'Não foi possível acessar a câmera.';
    if(e && e.name === 'NotAllowedError') msg = 'Permissão da câmera negada. Toque no cadeado/ícone ao lado do endereço e permita a câmera para este site.';
    else if(e && e.name === 'NotFoundError') msg = 'Nenhuma câmera foi encontrada neste aparelho.';
    else if(e && e.name === 'NotReadableError') msg = 'A câmera está sendo usada por outro aplicativo.';
    showCameraError(msg);
  }
}
function showCameraError(msg){
  $('#video').style.display = 'none';
  $('#shutter-btn').style.display = 'none';
  let box = $('#camera-error-box');
  if(!box){
    box = document.createElement('div');
    box.id = 'camera-error-box';
    box.style.cssText = 'max-width:340px; text-align:center; color:var(--gold-pale); font-size:15px; font-weight:600; padding:0 24px; line-height:1.5;';
    $('.camera-wrap').appendChild(box);
  }
  box.textContent = msg;
  box.style.display = 'block';
}
function hideCameraError(){
  const box = $('#camera-error-box');
  if(box) box.style.display = 'none';
}
function stopCamera(){
  if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
}
$('#shutter-btn').onclick = () => {
  const video = $('#video');
  const canvas = $('#canvas');
  const targetW = 240;
  const scale = targetW / video.videoWidth;
  canvas.width = targetW;
  canvas.height = video.videoHeight * scale;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1,1); // espelha de volta ao normal
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.55);
  stopCamera();
  finishPunch(dataUrl);
};
$('#cam-skip-btn').onclick = () => { stopCamera(); finishPunch(null); };

async function finishPunch(fotoDataUrl){
  const now = new Date();
  const data = todayStr(now);
  const hora = nowHMS(now);
  const f = FUNCIONARIAS.find(x => x.id === selectedId);
  const registro = { id: uid(), funcionariaId: f.id, nome: f.nome, data, hora, tipo: pendingTipo, foto: fotoDataUrl, synced: false };
  const mk = monthKeyOf(data);
  const list = await getData(`registros:${mk}`, []);
  list.push(registro);
  await setData(`registros:${mk}`, list);
  showTicket(registro);
  await renderTiles();
  selectedId = null;
  $('#selected-hint').textContent = 'Toque no seu nome acima';
  $('#stamp-btn').disabled = true;
  syncRegistro(registro, mk); // envia para a planilha em tempo real (se configurado)
}

/* ============================ SINCRONIZAÇÃO EM TEMPO REAL (Planilha Google) ============================ */
async function syncRegistro(registro, mk){
  if(!CONFIG.sheetsUrl) return; // não configurado, segue funcionando 100% localmente
  try{
    await fetch(CONFIG.sheetsUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        id: registro.id, data: registro.data, hora: registro.hora,
        nome: registro.nome, tipo: registro.tipo
      })
    });
    // modo no-cors não permite ler a resposta; consideramos enviado se não deu erro de rede
    registro.synced = true;
    const list = await getData(`registros:${mk}`, []);
    const idx = list.findIndex(r => r.id === registro.id);
    if(idx > -1){ list[idx].synced = true; await setData(`registros:${mk}`, list); }
  }catch(e){
    console.warn('Sincronização falhou, será tentada novamente mais tarde', e);
  }
}

async function resyncPending(){
  if(!CONFIG.sheetsUrl) return;
  const now = new Date();
  for(let i = 0; i < 2; i++){ // verifica o mês atual e o anterior
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const mk = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    const list = await getData(`registros:${mk}`, []);
    const pendentes = list.filter(r => !r.synced);
    for(const r of pendentes){ await syncRegistro(r, mk); }
  }
}
window.addEventListener('online', resyncPending);
setInterval(resyncPending, 120000);

/* ============================ ADMIN LOGIN ============================ */
function buildKeypad(){
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  const kp = $('#keypad');
  kp.innerHTML = '';
  keys.forEach(k => {
    const b = document.createElement('button');
    b.className = 'key';
    b.textContent = k;
    if(k === ''){ b.style.visibility='hidden'; }
    b.onclick = () => handleKey(k);
    kp.appendChild(b);
  });
}
function renderPinDots(){
  $$('#pin-dots .pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pinBuffer.length));
}
async function handleKey(k){
  if(k === '' ) return;
  if(k === '⌫'){ pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); return; }
  if(pinBuffer.length >= 4) return;
  pinBuffer += k;
  renderPinDots();
  if(pinBuffer.length === 4){
    if(pinBuffer === CONFIG.pin){
      $('#pin-error').textContent = '';
      pinBuffer=''; renderPinDots();
      currentAdminTab = 'funcionarias';
      await openAdmin();
    } else {
      $('#pin-error').textContent = 'Código incorreto';
      setTimeout(()=>{ pinBuffer=''; renderPinDots(); $('#pin-error').textContent=''; }, 700);
    }
  }
}

/* --- Cálculo de resumo mensal --- */
async function computeMonthSummary(monthStr){
  const registros = await getData(`registros:${monthStr}`, []);
  const byEmp = {};
  FUNCIONARIAS.forEach(f => byEmp[f.id] = { nome: f.nome, dias: {} });
  registros.forEach(r => {
    if(!byEmp[r.funcionariaId]) byEmp[r.funcionariaId] = { nome: r.nome, dias: {} };
    if(!byEmp[r.funcionariaId].dias[r.data]) byEmp[r.funcionariaId].dias[r.data] = [];
    byEmp[r.funcionariaId].dias[r.data].push(r);
  });
  const summary = {};
  Object.keys(byEmp).forEach(empId => {
    const dias = byEmp[empId].dias;
    const diasArr = Object.keys(dias).sort();
    const linhas = [];
    let totalHoras = 0, diasTrabalhados = 0;
    diasArr.forEach(dataStr => {
      const eventos = dias[dataStr].slice().sort((a,b) => a.hora.localeCompare(b.hora));
      let entradaHora = null, saidaHora = null, horasDia = 0;
      for(let i=0;i<eventos.length;i+=2){
        const ent = eventos[i]; const sai = eventos[i+1];
        if(ent && ent.tipo === 'entrada') entradaHora = ent.hora;
        if(sai && sai.tipo === 'saida'){
          saidaHora = sai.hora;
          const [h1,m1,s1] = ent.hora.split(':').map(Number);
          const [h2,m2,s2] = sai.hora.split(':').map(Number);
          let dur = (h2*3600+m2*60+s2 - (h1*3600+m1*60+s1))/3600; // tempo total entre entrada e saída (já inclui a 1h de almoço)
          if(dur > 0) horasDia += dur;
        }
      }
      if(horasDia > 0) diasTrabalhados++;
      totalHoras += horasDia;
      let status = 'ok';
      if(horasDia < 8.92) status = 'low'; else if(horasDia > 9.1) status = 'extra';
      linhas.push({ data: dataStr, entrada: entradaHora, saida: saidaHora, horas: horasDia, status, eventos });
    });
    const esperado = diasTrabalhados * 9;
    summary[empId] = { nome: byEmp[empId].nome, linhas, totalHoras, diasTrabalhados, esperado, saldo: totalHoras - esperado };
  });
  return summary;
}
function fmtHoras(h){
  const sign = h < 0 ? '-' : '';
  h = Math.abs(h);
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${sign}${hh}h${pad(mm)}`;
}

/* --- Fechamento mensal tab --- */
function isFirstBusinessDayToday(){
  const now = new Date();
  const day = now.getDay();
  if(day === 0 || day === 6) return false;
  // percorre do dia 1 até hoje verificando se algum dia anterior útil já passou
  for(let d = 1; d < now.getDate(); d++){
    const dt = new Date(now.getFullYear(), now.getMonth(), d);
    if(dt.getDay() !== 0 && dt.getDay() !== 6) return false;
  }
  return true;
}
function previousMonthStr(){
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth()-1, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

      </p>

  `;
}

async function exportXLSX(monthStr){
  const summary = await computeMonthSummary(monthStr);
  const empIds = Object.keys(summary).filter(id => summary[id].linhas.length > 0);
  const [y,m] = monthStr.split('-');
  const mesNome = MESES[parseInt(m)-1];
  const wb = XLSX.utils.book_new();

  const resumoData = [['Funcionária','Dias trabalhados','Total de horas','Horas esperadas','Saldo (h)']];
  empIds.forEach(id => {
    const s = summary[id];
    resumoData.push([s.nome, s.diasTrabalhados, Number(s.totalHoras.toFixed(2)), s.esperado, Number(s.saldo.toFixed(2))]);
  });
  const wsResumo = XLSX.utils.aoa_to_sheet(resumoData);
  XLSX.utils.book_append_sheet(wb, wsResumo, 'Resumo');

  empIds.forEach(id => {
    const s = summary[id];
    const data = [['Data','Entrada','Saída','Horas (jornada, com almoço)','Status']];
    s.linhas.forEach(l => {
      data.push([formatDateBR(l.data), l.entrada ? l.entrada.slice(0,5) : '', l.saida ? l.saida.slice(0,5) : '', Number(l.horas.toFixed(2)), l.status === 'ok' ? 'Completo' : l.status === 'low' ? 'Abaixo de 9h' : 'Horas extras']);
    });
    data.push(['','','Total', Number(s.totalHoras.toFixed(2)), '']);
    const sheetName = s.nome.slice(0,28).replace(/[\\/*?:\[\]]/g,'');
    const ws = XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, sheetName || id);
  });

  XLSX.writeFile(wb, `fechamento_${mesNome}_${y}.xlsx`);
}

async function prepareEmail(monthStr){
  const summary = await computeMonthSummary(monthStr);
  const empIds = Object.keys(summary).filter(id => summary[id].linhas.length > 0);
  const [y,m] = monthStr.split('-');
  const mesNome = MESES[parseInt(m)-1];
  let bodyLines = [`Segue o fechamento de ponto de ${mesNome}/${y}.`, '', 'Resumo por funcionária:'];
  empIds.forEach(id => {
    const s = summary[id];
    bodyLines.push(`- ${s.nome}: ${s.diasTrabalhados} dias, total ${fmtHoras(s.totalHoras)}, saldo ${fmtHoras(s.saldo)}`);
  });
  bodyLines.push('', 'Planilha completa em anexo (lembre-se de anexar o arquivo baixado).');
  const subject = encodeURIComponent(`Fechamento de Ponto - ${mesNome}/${y}`);
  const body = encodeURIComponent(bodyLines.join('\n'));
  window.location.href = `mailto:hamilton@newsi.com.br?subject=${subject}&body=${body}`;
}

  `;
